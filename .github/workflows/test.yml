name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hourline
          POSTGRES_PASSWORD: hourline
          POSTGRES_DB: hourline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hourline -d hourline"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hourline:hourline@localhost:5432/hourline
      AUTH_SECRET: ci-test-secret-must-be-at-least-32-chars-long
      AUTH_URL: http://localhost:3000
      APP_DISPLAY_NAME: Hourline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm run test

      - run: npm run build
