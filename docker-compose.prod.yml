services:
  db:
    image: postgres:16-alpine
    container_name: hourline-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hourline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hourline
    volumes:
      - hourline_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hourline -d hourline"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: hourline-migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hourline-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3011:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_DISPLAY_NAME: Hourline
    entrypoint: ["node", "server.js"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  hourline_pg_data:
